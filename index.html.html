<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saudi Pro League - Under Maintenance</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col">

    <header class="bg-gray-800 text-white p-4 shadow-md">
        <div class="container mx-auto flex items-center gap-4">
            <img src="https://ids-beta.saudipl.sa/storage/spl-logo.svg" alt="Saudi Pro League Logo" class="h-12 w-auto">
            <h1 class="text-2xl font-bold">Saudi Pro League</h1>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="w-full max-w-3xl bg-white shadow-xl rounded-lg overflow-hidden">
            
            <div class="px-10 py-16 text-center">
                <h1 class="text-4xl md:text-5xl font-extrabold text-gray-800 leading-tight">
                    Enhancing Your Experience <br><br>
                    <span class="text-indigo-700">نعمل على تحسين تجربتكم</span>
                </h1>
                
                <div class="w-24 mx-auto mt-8 border-b-4 border-indigo-600" />
            </div>

            <div class="px-10 py-10 bg-gray-50 border-t border-gray-200 text-center">
                <p class="text-xl md:text-2xl text-gray-800 leading-relaxed">
                    نقوم حاليًا بإجراء تحديثات وتحسينات لتقديم تجربة أفضل لكم.
                </p>
                <p class="text-xl md:text-2xl text-gray-600 mt-4 leading-relaxed italic">
                    We’re currently making updates and optimizations to bring you an even better experience.
                </p>
            </div>
            
        </div>
    </main>

    <footer class="bg-gray-800 text-white p-6">
        <div class="container mx-auto text-center">
            <p class="text-lg">&copy; 2025 Saudi Pro League</p>
        </div>
    </footer>

</body>
</html>
